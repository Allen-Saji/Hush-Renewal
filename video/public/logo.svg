<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64" fill="none">
  <!--
    HushRenewal mark: two outer bars are the two sealed sides; the accent
    connector is the clearing that joins them. Reads as an "H" and as
    "two halves matched". Carries its own dark tile so it renders the same
    on light and dark GitHub themes.
  -->
  <rect width="64" height="64" rx="14" fill="#101216"/>
  <rect x="18" y="16" width="6" height="32" rx="3" fill="#f3f5f8"/>
  <rect x="40" y="16" width="6" height="32" rx="3" fill="#f3f5f8"/>
  <rect x="24" y="28" width="16" height="8" rx="4" fill="#2f6bf0"/>
</svg>
