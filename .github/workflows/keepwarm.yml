name: keep-warm

# Render free web services idle out after ~15 min without inbound traffic, then
# cold-start (~30-60s) on the next request. A lightweight ping every 10 minutes
# keeps the backend awake so judges never hit a spin-up.
#
# After deploying, set a repository variable BACKEND_URL to the Render URL
# (Settings -> Secrets and variables -> Actions -> Variables). Until then this
# job is a no-op.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_URL not set; skipping keep-warm ping."
            exit 0
          fi
          curl -fsS --max-time 60 "${URL%/}/health" && echo " -- warm"
