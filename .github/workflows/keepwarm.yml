name: keep-warm

# Render free web services idle out after ~15 min without inbound traffic, then
# cold-start (~30-60s) on the next request. A lightweight ping every 10 minutes
# keeps all three services (backend + both agents) awake so a live demo or the
# judges never hit a spin-up.
#
# After deploying, set three repository variables to the Render URLs
# (Settings -> Secrets and variables -> Actions -> Variables):
#   BACKEND_URL, CUSTOMER_AGENT_URL, VENDOR_AGENT_URL
# Any that are unset are skipped, so this stays a no-op until you deploy.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health on all services
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          CUSTOMER_AGENT_URL: ${{ vars.CUSTOMER_AGENT_URL }}
          VENDOR_AGENT_URL: ${{ vars.VENDOR_AGENT_URL }}
        run: |
          for URL in "$BACKEND_URL" "$CUSTOMER_AGENT_URL" "$VENDOR_AGENT_URL"; do
            if [ -z "$URL" ]; then
              echo "(unset URL; skipping)"
              continue
            fi
            echo "Pinging ${URL%/}/health"
            curl -fsS --max-time 60 "${URL%/}/health" && echo " -- warm"
          done
