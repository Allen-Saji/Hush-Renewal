name: keep-warm (legacy Render)

# Manual health check only. Production moved to persistent systemd services on
# the HushRenewal VPS deployment, so no keep-warm schedule is needed. The three
# repository variables point to the current production service URLs:
#   BACKEND_URL, CUSTOMER_AGENT_URL, VENDOR_AGENT_URL

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health on all services
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          CUSTOMER_AGENT_URL: ${{ vars.CUSTOMER_AGENT_URL }}
          VENDOR_AGENT_URL: ${{ vars.VENDOR_AGENT_URL }}
        run: |
          for URL in "$BACKEND_URL" "$CUSTOMER_AGENT_URL" "$VENDOR_AGENT_URL"; do
            if [ -z "$URL" ]; then
              echo "(unset URL; skipping)"
              continue
            fi
            echo "Pinging ${URL%/}/health"
            curl -fsS --max-time 60 "${URL%/}/health" && echo " -- warm"
          done
